<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TB2 — Release Impact Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f14;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
#lock{display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:320px;padding:0 24px}
.lock-icon{color:rgba(255,255,255,.1);margin-bottom:2px}
.lock-title{font-size:13px;font-weight:500;color:#6a7888;letter-spacing:-.01em;text-align:center}
.lock-sub{font-family:'DM Mono',monospace;font-size:9px;color:#2a3040;letter-spacing:.1em;text-transform:uppercase;text-align:center;margin-top:-10px}
.pw-wrap{width:100%;position:relative}
#pw{
  width:100%;background:#10131a;border:1px solid rgba(255,255,255,.07);
  border-radius:8px;padding:10px 60px 10px 14px;
  font-family:'DM Mono',monospace;font-size:13px;color:#8a9ab0;
  outline:none;transition:border-color .15s;letter-spacing:.05em;
}
#pw:focus{border-color:rgba(61,106,170,.4)}
#pw.error{border-color:rgba(160,60,50,.5);animation:shake .25s ease}
#btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:#3a4252;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;
  text-transform:uppercase;padding:4px 6px;transition:color .12s
}
#btn:hover{color:#6a7888}
#btn:disabled{opacity:.4;cursor:default}
.err{font-family:'DM Mono',monospace;font-size:9px;color:rgba(180,80,60,.7);letter-spacing:.05em;height:14px;text-align:center}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.06);border-top-color:rgba(61,106,170,.5);border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
#dash{display:none;width:100%}
</style>
</head>
<body>

<div id="lock">
  <svg class="lock-icon" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <rect x="3" y="11" width="18" height="11" rx="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </svg>
  <div class="lock-title">TB2 Release Impact Dashboard</div>
  <div class="lock-sub">AES-256 encrypted · enter password</div>
  <div class="pw-wrap">
    <input id="pw" type="password" placeholder="Password" autocomplete="off" spellcheck="false">
    <button id="btn" onclick="unlock()">Enter</button>
  </div>
  <div class="spinner" id="spin"></div>
  <div class="err" id="err"></div>
</div>

<div id="dash"></div>

function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function unlock() {
  const pw  = document.getElementById('pw').value;
  const btn = document.getElementById('btn');
  const spinner = document.getElementById('spin');
  const errEl = document.getElementById('err');
  if (!pw) return;

  btn.disabled = true;
  spinner.style.display = 'block';
  errEl.textContent = '';

  try {
    const salt = b64ToBytes(SALT_B64);
    const iv   = b64ToBytes(IV_B64);
    const ct   = b64ToBytes(CT_B64);

    const key = await deriveKey(pw, salt);
    const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
    const html = new TextDecoder().decode(plainBuf);

    // Password correct — remove lock screen, inject dashboard
    document.getElementById('lock').remove();
    const dash = document.getElementById('dash');
    dash.style.display = 'block';
    dash.innerHTML = html;

    // Re-execute scripts (Chart.js etc.)
    const scripts = dash.querySelectorAll('script');
    for (const old of scripts) {
      const s = document.createElement('script');
      if (old.src) {
        await new Promise(res => { s.src = old.src; s.onload = res; document.body.appendChild(s); });
      } else {
        s.textContent = old.textContent;
        document.body.appendChild(s);
      }
      old.remove();
    }

  } catch (e) {
    // Decryption failed = wrong password
    btn.disabled = false;
    spinner.style.display = 'none';
    const inp = document.getElementById('pw');
    inp.classList.add('error');
    errEl.textContent = 'Incorrect password';
    inp.value = '';
    setTimeout(() => { inp.classList.remove('error'); errEl.textContent = ''; }, 1500);
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});
